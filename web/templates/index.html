<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaru - 全量应用发布工具箱</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <rect x="2" y="2" width="16" height="16" rx="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M6 10l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <div class="brand-name">Aaru</div>
                    <div class="brand-desc">发布工具箱</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">核心功能</div>
                <a href="#" class="nav-item active" data-page="releases" onclick="loadPage('releases')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1l7 4v6l-7 4-7-4V5l7-4z" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 8L1 5l7-4 7 4-7 4z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
                    <span>发布管理</span>
                </a>
                <a href="#" class="nav-item" data-page="deploy-units" onclick="loadPage('deploy-units')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.2"/></svg>
                    <span>部署单元</span>
                </a>
                <a href="#" class="nav-item" data-page="approvals" onclick="loadPage('approvals')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
                    <span>审批中心</span>
                    <span class="nav-badge" id="approval-badge" style="display:none">0</span>
                </a>
                <div class="nav-section-label">晋级策略</div>
                <a href="#" class="nav-item" data-page="blueprints" onclick="loadPage('blueprints')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="7" y1="4" x2="9" y2="4" stroke="currentColor" stroke-width="1"/><line x1="4" y1="7" x2="4" y2="9" stroke="currentColor" stroke-width="1"/></svg>
                    <span>晋级蓝图</span>
                </a>
                <div class="nav-section-label">系统管理</div>
                <a href="#" class="nav-item" data-page="admin" id="nav-admin" onclick="loadPage('admin')" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2" fill="none"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3M3.5 3.5l2.1 2.1M10.4 10.4l2.1 2.1M3.5 12.5l2.1-2.1M10.4 5.6l2.1-2.1" stroke="currentColor" stroke-width="1.2"/></svg>
                    <span>权限管理</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-card">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-info">
                        <div class="user-name" id="user-name">加载中...</div>
                        <div class="user-role" id="user-role">-</div>
                    </div>
                    <button class="btn-logout" onclick="logout()">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1 class="page-title" id="page-title">发布管理</h1>
                    <p class="page-subtitle" id="page-subtitle">管理应用发布流水线</p>
                </div>
                <div class="header-actions" id="header-actions"></div>
            </header>
            <div class="content-body" id="content-body">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </main>
    </div>
    <div class="toast-container" id="toast-container"></div>
    <script src="/static/js/app.js"></script>
</body>
</html>
